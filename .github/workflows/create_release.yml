name: CreateRelease

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:


jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies Pt.1
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libtag1-dev libmusicbrainz5-dev libcurl4-openssl-dev libneon27-dev libjansson-dev libxml2-dev

      - name: Install Dependencies Pt.2
        run: |
          git clone https://github.com/metabrainz/libcoverart
          cd libcoverart
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
          sudo cmake --install build

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trax_linux
          path: build/trax

  build-macos:
    runs-on: macos-latest
    permissions: 
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install deps
        run: brew install cmake taglib libmusicbrainz libcurl
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trax_macos
          path: build/trax

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-taglib
            mingw-w64-x86_64-libmusicbrainz
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Configure
        shell: msys2 {0}
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: msys2 {0}
        run: cmake --build build

      - name: Upload Artifact                # was missing entirely
        uses: actions/upload-artifact@v4
        with:
          name: trax_windows
          path: build/trax.exe

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts             # was missing — build/ doesn't exist on this runner
        uses: actions/download-artifact@v4
        with:
          path: dist/


      - name: Prepare Artifacts
        run: |
          cp dist/trax_linux/trax dist/trax_linux_x86_64
          cp dist/trax_macos/trax dist/trax_macos_arm
          cp dist/trax_windows/trax.exe dist/trax_windows_x86_64.exe
          chmod +x dist/trax_linux_x86_64 dist/trax_macos_arm

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/trax_linux_x86_64
            dist/trax_macos_arm
            dist/trax_windows_x86_64.exe
            simple_install.sh
          generate_release_notes: true
          prerelease: false
