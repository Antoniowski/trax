name: CreateRelease

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:


jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake make libtag1-dev libmusicbrainz5-dev libcurl4-openssl-dev libcoverart-dev

      - name: Build Trax
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Prepare Artifacts
        run: |
          cp build/trax build/trax_linux_x86_64

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/trax_linux_x86_64
            install_runtime_dependencies.sh
          generate_release_notes: true
          prerelease: false
